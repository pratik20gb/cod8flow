spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS}

server:
  port: ${PORT:8080}

cors:
  allowed-origins: https://cod8flow.thecod8r.space

logging:
  level:
    com.cod8flow: INFO
    org.hibernate.SQL: WARN