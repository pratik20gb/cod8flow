version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cod8flow-postgres
    environment:
      POSTGRES_DB: cod8flow_db
      POSTGRES_USER: cod8flow
      POSTGRES_PASSWORD: cod8flow
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cod8flow -d cod8flow_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cod8flow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data: