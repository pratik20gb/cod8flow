version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: flowboard-postgres
    environment:
      POSTGRES_DB: flowboard_db
      POSTGRES_USER: flowboard
      POSTGRES_PASSWORD: flowboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowboard -d flowboard_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flowboard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data: