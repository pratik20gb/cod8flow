apiVersion: v1
kind: Service
metadata:
  name: {{ include "cod8flow.fullname" . }}
  labels:
    {{- include "cod8flow.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "cod8flow.selectorLabels" . | nindent 4 }}
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP