<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code8Flow — coming soon</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0A0A0A;
            color: #F3F4F6;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .stage {
            width: 100%;
            max-width: 640px;
            padding: 48px 32px;
            text-align: center;
        }

        .logo-wrap {
            width: 110px;
            height: 110px;
            margin: 0 auto 32px;
            opacity: 0;
            animation: fadeIn 0.6s ease forwards;
        }

        .logo-wrap svg { width: 100%; height: 100%; }

        .sq {
            fill: none;
            stroke-width: 4.5;
            stroke-linejoin: round;
        }

        .sq-back {
            stroke: url(#goldBack);
            stroke-dasharray: 360;
            stroke-dashoffset: 360;
            animation: draw 1.1s 0.2s cubic-bezier(0.65,0,0.35,1) forwards;
        }

        .sq-front {
            stroke: url(#goldFront);
            stroke-dasharray: 360;
            stroke-dashoffset: 360;
            animation: draw 1.1s 0.5s cubic-bezier(0.65,0,0.35,1) forwards;
        }

        .shine-mask-rect {
            transform: translateX(-140px);
            animation: shineSweep 2.6s 1.7s ease-in-out forwards;
        }

        .wordmark {
            font-size: 38px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin: 0 0 14px;
            background: linear-gradient(135deg, #FFF8DE 0%, #E8B84B 45%, #B8862E 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            opacity: 0;
            animation: fadeUp 0.7s 1.0s ease forwards;
        }

        .tagline {
            font-size: 16px;
            font-weight: 400;
            color: #9CA3AF;
            margin: 0 0 8px;
            opacity: 0;
            animation: fadeUp 0.7s 1.2s ease forwards;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            color: #D9A53D;
            margin: 16px 0 48px;
            opacity: 0;
            animation: fadeUp 0.7s 1.4s ease forwards;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #D9A53D;
            animation: pulse 2s infinite;
        }

        .teaser-wrap {
            perspective: 1200px;
            opacity: 0;
            animation: fadeUp 0.9s 1.6s ease forwards;
        }

        .teaser {
            background: #111317;
            border: 1px solid #26282E;
            border-radius: 14px;
            padding: 18px;
            transform: rotateX(8deg);
            box-shadow: 0 30px 60px -20px rgba(0,0,0,0.6);
        }

        .teaser-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .teaser-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #9CA3AF;
        }

        .teaser-dot { width: 6px; height: 6px; border-radius: 50%; }

        .board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .col-label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            color: #6B7280;
            margin-bottom: 8px;
        }

        .col-dot { width: 5px; height: 5px; border-radius: 50%; }

        .card {
            background: #1A1C21;
            border: 1px solid #2A2D34;
            border-radius: 7px;
            padding: 8px;
            margin-bottom: 6px;
        }

        .card-title {
            font-size: 10px;
            color: #D1D5DB;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .card-foot { display: flex; align-items: center; justify-content: space-between; }

        .badge {
            font-size: 8px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 500;
        }

        .avatar {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            font-size: 7px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .footer-note {
            margin-top: 40px;
            font-size: 12px;
            color: #4B5563;
            opacity: 0;
            animation: fadeUp 0.7s 1.9s ease forwards;
        }

        @keyframes draw { to { stroke-dashoffset: 0; } }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes shineSweep { from { transform: translateX(-140px); } to { transform: translateX(320px); } }

        @media (prefers-reduced-motion: reduce) {
            * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; }
        }
    </style>
</head>
<body>

<div class="stage">

    <div class="logo-wrap">
        <svg viewBox="0 0 100 100">
            <defs>
                <linearGradient id="goldBack" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#FFFFFF"/>
                    <stop offset="18%" stop-color="#FFF3CC"/>
                    <stop offset="45%" stop-color="#D9A53D"/>
                    <stop offset="75%" stop-color="#9A7325"/>
                    <stop offset="100%" stop-color="#6E4F15"/>
                </linearGradient>
                <linearGradient id="goldFront" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#FFFFFF"/>
                    <stop offset="20%" stop-color="#FFF8DE"/>
                    <stop offset="48%" stop-color="#E8B84B"/>
                    <stop offset="78%" stop-color="#B8862E"/>
                    <stop offset="100%" stop-color="#8A621F"/>
                </linearGradient>
                <clipPath id="logoClip">
                    <rect x="20" y="20" width="40" height="40" rx="6.5"/>
                    <rect x="40" y="40" width="40" height="40" rx="6.5"/>
                </clipPath>
                <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
                    <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.8"/>
                    <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
                </linearGradient>
            </defs>
            <rect class="sq sq-back" x="20" y="20" width="40" height="40" rx="6.5"/>
            <rect class="sq sq-front" x="40" y="40" width="40" height="40" rx="6.5"/>
            <g clip-path="url(#logoClip)">
                <rect class="shine-mask-rect" x="0" y="0" width="60" height="100" fill="url(#shineGrad)" transform-origin="0 0" style="transform-box: fill-box;"/>
            </g>
        </svg>
    </div>

    <h1 class="wordmark">code8flow</h1>
    <p class="tagline">Where work flows.</p>

    <div class="status">
        <span class="status-dot"></span>
        <span>Coming soon</span>
    </div>

    <div class="teaser-wrap">
        <div class="teaser">
            <div class="teaser-header">
                <div class="teaser-title">
                    <span style="width:16px;height:16px;border-radius:4px;background:#7C3AED;display:inline-block;"></span>
                    Sprint 1 — Engineering
                </div>
                <span style="font-size:10px;color:#6B7280;">4 columns</span>
            </div>
            <div class="board">
                <div>
                    <div class="col-label"><span class="col-dot" style="background:#94A3B8;"></span>To do</div>
                    <div class="card">
                        <div class="card-title">Design landing hero</div>
                        <div class="card-foot">
                            <span class="badge" style="background:#3A2F18;color:#E8B84B;">High</span>
                            <span class="avatar" style="background:#1E3A5F;color:#85B7EB;">PD</span>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-title">Write API docs</div>
                        <div class="card-foot">
                            <span class="badge" style="background:#1F2937;color:#9CA3AF;">Med</span>
                            <span class="avatar" style="background:#0F3D33;color:#5DCAA5;">AS</span>
                        </div>
                    </div>
                </div>
                <div>
                    <div class="col-label"><span class="col-dot" style="background:#3B82F6;"></span>In progress</div>
                    <div class="card">
                        <div class="card-title">JWT refresh flow</div>
                        <div class="card-foot">
                            <span class="badge" style="background:#3A1F1F;color:#F09595;">Urgent</span>
                            <span class="avatar" style="background:#1E3A5F;color:#85B7EB;">PD</span>
                        </div>
                    </div>
                </div>
                <div>
                    <div class="col-label"><span class="col-dot" style="background:#D97706;"></span>In review</div>
                    <div class="card">
                        <div class="card-title">S3 upload flow</div>
                        <div class="card-foot">
                            <span class="badge" style="background:#3A2F18;color:#E8B84B;">High</span>
                            <span class="avatar" style="background:#3A2F18;color:#FAC775;">RK</span>
                        </div>
                    </div>
                </div>
                <div>
                    <div class="col-label"><span class="col-dot" style="background:#10B981;"></span>Done</div>
                    <div class="card" style="opacity:0.5;">
                        <div class="card-title" style="text-decoration:line-through;">JWT auth</div>
                        <div class="card-foot">
                            <span class="badge" style="background:#1F2937;color:#9CA3AF;">Med</span>
                            <span class="avatar" style="background:#1E3A5F;color:#85B7EB;">PD</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <p class="footer-note">thcod8r.space/code8flow</p>

</div>

</body>
</html>
